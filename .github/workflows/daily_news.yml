name: Daily News Ingestion

on:
  schedule:
    - cron: '30 6 * * *'   # 12:00 PM IST = 06:30 UTC
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch and ingest news
        run: node .github/scripts/daily_news.js
        env:
          RAILWAY_URL: https://uppsc-pyq-production.up.railway.app
